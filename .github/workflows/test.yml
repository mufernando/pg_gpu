name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          environments: lint
      - run: pixi run -e lint ruff check pg_gpu/ tests/ examples/

  # GPU tests and moments integration require a GPU and must be run locally:
  #   pixi run pytest tests/ -v
  #   pixi run -e moments pytest tests/test_moments_ld.py -v
