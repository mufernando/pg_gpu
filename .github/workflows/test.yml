name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-gpu:
    name: GPU tests
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install environment
        run: pixi install

      - name: Run tests
        run: pixi run pytest tests/ -v --tb=short -x

      - name: Run allel validation
        run: pixi run python tests/validate_against_allel.py

  test-moments:
    name: Moments integration tests
    runs-on: self-hosted
    timeout-minutes: 30
    needs: test-gpu

    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install moments environment
        run: pixi install -e moments

      - name: Run moments tests
        run: pixi run -e moments pytest tests/test_moments_ld.py -v --tb=short
