name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - run: pixi install -e lint
      - run: pixi run -e lint ruff check pg_gpu/ tests/ examples/

  test-gpu:
    name: GPU tests
    runs-on: self-hosted
    timeout-minutes: 30
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - run: pixi install
      - run: pixi run pytest tests/ -v --tb=short -x
      - run: pixi run python tests/validate_against_allel.py

  test-moments:
    name: Moments integration
    runs-on: self-hosted
    timeout-minutes: 30
    needs: test-gpu
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - run: pixi install -e moments
      - run: pixi run -e moments pytest tests/test_moments_ld.py -v --tb=short
