[workspace]
name = "pg_gpu"
version = "0.1.0"
description = "GPU-accelerated population genetics statistics"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.12,<3.13"
numpy = ">=2.0"
scipy = ">=1.12"
pandas = ">=2.0"
scikit-allel = ">=1.3"
msprime = ">=1.0"
h5py = ">=3.0"
tqdm = ">=4.0"
cupy = ">=13.0"
cuda-version = "12.*"
notebook = ">=7.5.5,<8"

[system-requirements]
cuda = "12"

[pypi-dependencies]
pg_gpu = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-xdist = ">=3.0"
ipython = ">=8.0"
ipykernel = ">=6.0"
ruff = ">=0.4"

[feature.moments.pypi-dependencies]
moments-popgen = "*"

[feature.docs.dependencies]
sphinx = ">=4.0"
sphinx-rtd-theme = ">=1.0"

[feature.lint.dependencies]
python = ">=3.12,<3.13"
ruff = ">=0.4"

[environments]
default = ["dev", "docs"]
moments = ["dev", "docs", "moments"]
lint = ["lint"]

[tasks]
test = { cmd = "pytest tests/ -v" }
test-parallel = { cmd = "pytest tests/ -v -n 10" }
lint = { cmd = "ruff check pg_gpu/ tests/ examples/" }
docs = { cmd = "make html", cwd = "docs" }
